<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Link Opener</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #counter { font-size: 24px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
    <h1>Processing Requests...</h1>
    <div id="counter">Opened: 0</div>
    <p>Please enable "Pop-ups" in your browser settings to allow this script to work.</p>

    <script>
        const targetUrl = "https://omg10.com/4/10492846";
        const totalOpenings = 100; // Change this to 500 if needed
        let currentCount = 1;

        const opener = setInterval(() => {
            if (currentCount < totalOpenings) {
                window.open(targetUrl, '_blank');
                currentCount++;
                document.getElementById("counter").innerText = "Opened: " + currentCount;
            } else {
                clearInterval(opener);
                document.querySelector('h1').innerText = "Task Completed!";
            }
        }, 1000); // Opens one link every 1 second
    </script>
</body>
</html>
